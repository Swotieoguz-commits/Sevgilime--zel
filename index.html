<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevgilime Özel</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #764ba2;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .heart {
            font-size: 40px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💜 Sevgilime Özel 💜</h1>
        <div class="heart">❤️</div>
        <p>Hoşgeldin! Bu sayfa sana özel yapılmıştır.</p>
        <p>Burası senin için özel bir yer...</p>
    </div>
</body>
</html>
