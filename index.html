<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum</title>
    <style>
        body {
            background-color: black;
            color: #7df9ff;
            font-family: monospace;
            font-size: 22px;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }
        #output {
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="output"></div>

    <script>
        let i = 1;
        const output = document.getElementById("output");

        function yaz() {
            const div = document.createElement("div");
            div.textContent = i + ". SENİ ÇOK SEVİYORUM 🤍";
            output.appendChild(div);
            i++;

            // Sayfa çok şişmesin diye eski satırları sil
            if (output.children.length > 100) {
                output.removeChild(output.firstChild);
            }
        }

        // Her 200ms'de bir yaz
        setInterval(yaz, 200);
        
        // İlk yazıyı hemen yaz
        yaz();
    </script>
</body>
</html>
